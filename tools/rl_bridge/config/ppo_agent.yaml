# ==============================================================================
# V2X QoS DRL Framework Industrial Configuration Matrix
# ==============================================================================

infrastructure:
  host: "127.0.0.1"
  port: 8080
  checkpoint_dir: "checkpoints"
  online_brain_path: "checkpoints/v2x_online_brain.pth"
  offline_brain_path: "checkpoints/v2x_offline_rmix_e20.pth"

v2x_bounds:
  max_packet_size: 1500.0
  max_f2_sq: 65025.0
  window_size: 64

hyperparameters:
  # Action Space expanded to 4 dimensions to regulate S0 sampling rate
  input_dim: 3
  action_dim: 3                         
  lr_online: 0.0003
  batch_size: 32
  ppo_epochs_online: 5
  clip_eps: 0.2
  gamma: 0.99

reward_shaping:
  anomaly_sensitivity_threshold: 0.005  
  active_attack_weights:
    penalty_scale: 0.5                  
    sq_thresh_scale: 0.2                
    budget_violation_scale: 10.0        
  nominal_traffic_weights:
    recovery_scale: 10.0                
    sq_overhead_scale: 0.1              
    # Penalize high AI sampling rates during peacetime to save CPU resources
    overhead_penalty_scale: 8.0